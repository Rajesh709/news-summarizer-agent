version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_news_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    restart: unless-stopped
    ports:
      - "8502:8502"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://api:8001
    depends_on:
      - api

volumes:
  redis_news_data:
